{% extends 'base.html' %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 60px); padding: 20px;">
<div class="glass-card form-wrapper fade-up">
  <h1>Create account</h1>
  <p class="subtitle">Join to access the sign language converter.</p>

  <form class="site-form" action="." method="post">
    {% csrf_token %}
    {{ form }}
    <button class="btn-primary" type="submit">Sign Up</button>
  </form>

  <div class="form-footer">
    Already have an account? <a href="{% url 'login' %}">Log In</a>
  </div>
</div>
</div>

<script type="text/javascript">
  // Clean up Django's default help text spans
  var spans = document.getElementsByTagName("span");
  if (spans.length > 0) spans[0].innerHTML = "";
  if (spans.length > 1) spans[1].innerHTML = "";
</script>
{% endblock %}
